# Default configuration for the HNEI OWC analyzer.
expected_cycle_times_s: [8, 7, 6, 5]
target_cycle_tolerance_s: 0.10
inferred_label_confidence_threshold: 0.65

column_aliases:
  TimeStamp: [timestamp, time_stamp, time, datetime, date_time]
  RecNum: [recnum, rec_num, record, record_number, recordnumber]
  Pressure_1: [pressure_1, pressure1, p1, press_1]
  Pressure_2: [pressure_2, pressure2, p2, press_2]
  Pressure_3: [pressure_3, pressure3, p3, press_3]
  Pressure_4: [pressure_4, pressure4, p4, press_4]
  Torque: [torque, shaft_torque]
  Encoder: [encoder, encoder_position, position]
  Gen_V: [gen_v, genv, generator_voltage, generator_v]
  Target_Cycle_s: [target_cycle_s, target_cycle, cycle_target_s]
  Target_VFD_Hz: [target_vfd_hz, vfd_target_hz, target_frequency_hz]
  VFD_Command_mV: [vfd_command_mv, command_mv, vfd_mv]
  Run_ID: [run_id, run, test_run]

required_columns: [TimeStamp]
numeric_columns:
  - RecNum
  - Pressure_1
  - Pressure_2
  - Pressure_3
  - Pressure_4
  - Torque
  - Encoder
  - Gen_V
  - Target_Cycle_s
  - Target_VFD_Hz
  - VFD_Command_mV

sensor_layout:
  Pressure_1: {location: upstream, pair: Pressure_2}
  Pressure_2: {location: upstream, pair: Pressure_1}
  Pressure_3: {location: downstream, pair: Pressure_4}
  Pressure_4: {location: downstream, pair: Pressure_3}

sensor_units:
  Pressure_1: Pa
  Pressure_2: Pa
  Pressure_3: Pa
  Pressure_4: Pa
  Torque: unknown
  Encoder: unknown
  Gen_V: V

validation:
  timing_gap_factor: 3.0
  sampling_jitter_relative_threshold: 0.10
  units_row_min_text_fraction: 0.50

filtering:
  enabled: true
  median_window_s: 0.06
  savgol_window_s: 0.60
  savgol_cycle_fraction: 0.12
  savgol_min_window_s: 0.15
  savgol_max_window_s: 1.00
  savgol_polynomial_order: 3
  detrend_enabled: false
  spike_mad_threshold: 6.0
  butterworth_enabled: false
  butterworth_cutoff_hz: 3.0
  butterworth_order: 4

quality_thresholds:
  spike_z_threshold: 6.0
  sampling_gap_factor: 3.0
  maximum_lag_cycle_fraction: 0.50

steady_state:
  minimum_steady_cycles: 3
  period_stability_tolerance: 0.12
  amplitude_stability_tolerance: 0.35
  manual_overrides: []

activity_detection:
  signals: [Encoder, Pressure_1, Pressure_2, Torque]
  rolling_window_s: 1.0
  encoder_std_threshold: 10.0
  encoder_range_threshold: 35.0
  supporting_noise_multiplier: 5.0
  active_score_threshold: 1.0
  minimum_active_duration_s: 8.0
  minimum_idle_duration_s: 1.5
  block_merge_gap_s: 0.75
  edge_cleanup_s: 0.25

period_estimation:
  smoothing_cycle_fraction: 0.12
  minimum_smoothing_window_s: 0.15
  maximum_smoothing_window_s: 1.0
  peak_prominence: 60.0
  minimum_peak_spacing_fraction: 0.55
  autocorrelation_min_period_s: 1.5
  autocorrelation_max_period_s: 10.0
  expected_match_tolerance_s: 0.75

encoder:
  peak_prominence: 60.0
  trough_prominence: 60.0
  minimum_peak_spacing_fraction: 0.60
  zero_crossing_direction: rising
  autocorrelation_min_period_s: 1.5
  autocorrelation_max_period_s: 10.0
  fft_min_period_s: 1.5
  fft_max_period_s: 10.0
  cycle_interval_outlier_rule: relative_deviation
  cycle_interval_deviation_tolerance: 0.10
  minimum_valid_intervals: 4
  method_agreement_tolerance_fraction: 0.05
  timing_confidence_threshold: 0.60

vfd_command:
  enabled: true
  cycle_frequency_numerator: 120.0
  command_frequency_offset_hz: 1.14
  command_slope_hz_per_mv: 0.00626
  command_min_mv: 0.0
  command_max_mv: 4000.0
  recorded_frequency_tolerance_hz: 0.05
  recorded_command_tolerance_mv: 5.0

plotting:
  dpi: 180
  formats: [png]

manual_run_boundary_overrides: []
manual_steady_state_overrides: []
